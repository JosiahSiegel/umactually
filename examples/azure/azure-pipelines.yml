# Example: UmActually PR review on Azure DevOps.
#
# Copy this file to azure-pipelines.yml at the repo root, then wire it into a
# branch policy build validation policy in the Azure DevOps project UI for the
# target branch (for example `main`).
#
# Notes:
# - pr: below is honored only for GitHub or Bitbucket Cloud repositories
#   mirrored into Azure Pipelines. For Azure Repos Git, configure branch
#   policy build validation instead of relying on pr:.
# - Enable "Allow scripts to access the OAuth token" in pipeline security.
# - Grant the build service "Contribute to pull requests" on the project.
# - The CLI requires a diff to review. Either pre-fetch the diff with the
#   Azure DevOps REST API and write it to AZURE_DIFF_PATH (recommended), or
#   use $(System.AccessToken) to fetch it on the fly.

trigger: none

pr:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  - name: NODE_VERSION
    value: "24.x"
  - name: AZURE_DIFF_PATH
    value: "$(Build.ArtifactStagingDirectory)/pr.diff"

steps:
  - checkout: self
    persistCredentials: true

  - task: NodeTool@0
    displayName: Use Node $(NODE_VERSION)
    inputs:
      versionSpec: $(NODE_VERSION)

  - script: npm ci
    displayName: Install dependencies

  # Fetch the PR diff from Azure DevOps using System.AccessToken as a bearer.
  # This step only runs on PR validation builds (when SYSTEM_PULLREQUEST_PULLREQUESTID is set).
  - script: |
      if [ -z "$(SYSTEM_PULLREQUEST_PULLREQUESTID)" ]; then
        echo "##[warning]SYSTEM_PULLREQUEST_PULLREQUESTID is empty; skipping diff fetch."
        exit 0
      fi
      mkdir -p "$(Build.ArtifactStagingDirectory)"
      curl -fsS \
        -H "Authorization: Bearer $(System.AccessToken)" \
        -H "Content-Type: application/json" \
        "$(SYSTEM_TEAMFOUNDATIONCOLLECTIONURI)$(SYSTEM_TEAMPROJECT)/_apis/git/repositories/$(BUILD_REPOSITORY_NAME)/pullRequests/$(SYSTEM_PULLREQUEST_PULLREQUESTID)/diffs?api-version=7.1-preview.1" \
        -o "$(AZURE_DIFF_PATH)"
    displayName: Fetch PR diff via Azure DevOps REST API
    env:
      SYSTEM_ACCESSTOKEN: $(System.AccessToken)

  # Documented dry-run path. The CLI is invoked via the bin/ shim so callers do
  # not need to know the dist/ layout. Pass --diff $(AZURE_DIFF_PATH) so the
  # action has a diff to review.
  - script: node bin/umactually-pr-review.mjs --platform azure-devops --repository example/umactually-fixture --diff "$(AZURE_DIFF_PATH)" --dry-run --output-artifact artifacts/manual/s4-azure-mocked-run.json
    displayName: Run UmActually PR review (dry-run)
    env:
      SYSTEM_ACCESSTOKEN: $(System.AccessToken)
      AZURE_DIFF_PATH: $(AZURE_DIFF_PATH)
      UMACTUALLY_API_URL: $(UMACTUALLY_API_URL)
      UMACTUALLY_API_KEY: $(UMACTUALLY_API_KEY)

  - task: PublishPipelineArtifact@1
    condition: always()
    displayName: Publish review artifacts
    inputs:
      targetPath: artifacts/manual
      artifact: umactually-review